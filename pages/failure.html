<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOLT | Pago rechazado</title>
  <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body{margin:0;background:#0b0b0b;color:#f2f2f2;font-family:Barlow,sans-serif;display:grid;place-items:center;min-height:100vh;padding:24px}
    .box{max-width:680px;border:1px solid #44464c;padding:28px;background:#111}
    h1{margin:0 0 10px;font-family:Teko,sans-serif;font-size:48px;letter-spacing:.04em}
    .accent{color:#c1121f}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    a{display:inline-block;margin-top:18px;padding:10px 16px;text-decoration:none;font-family:Teko,sans-serif;letter-spacing:.08em}
    .primary{background:#c1121f;color:#fff}
    .secondary{border:1px solid #44464c;color:#f2f2f2}
  </style>
</head>
<body>
  <main class="box">
    <h1>Pago <span class="accent">no completado</span></h1>
    <p>Hubo un problema con el pago. Podes intentar nuevamente.</p>
    <div class="actions">
      <a class="primary" href="/pages/catalogo.html">Intentar de nuevo</a>
      <a class="secondary" href="/pages/catalogo.html">Volver al catalogo</a>
    </div>
  </main>
</body>
</html>
